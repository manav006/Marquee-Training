<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height:80vh;
            width:80vw;
            margin:auto;
            display:grid;
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            border: 1px solid black;
        }
        .box{
            height: 50px;
            width: 50px;
            background-color: black;
        }
        .box1{
            justify-self:end;
            align-self:end;
        }
        .box2{
            justify-self:center;
            align-self:center;
        }

        .box3{
            justify-self:end;
            align-self:start;
        }

        .box4{
            justify-self:start;
            align-self:center;
        }

        .box5{
            justify-self:end;
            align-self:center;
        }
        .box6{
            justify-self:start;
            align-self:center;
        }

        .box7{
            justify-self:start;
            align-self:end;
        }

        .box8{
            justify-self:center;
            align-self:start;
        }
        .box9{
            justify-self:end;
            align-self:center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
        <div class="box box5"></div>
        <div class="box box6"></div>
        <div class="box box7"></div>
        <div class="box box8"></div>
        <div class="box box9"></div>
    </div>
</body>
</html>
