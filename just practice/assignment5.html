<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: black;
            height: 90vh;
            width: 60vw;
            margin: auto;
        }
        .upper{
            
            height: 33%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .upperbox{
            width: 90%;
            height: 90%;
            background-color: blueviolet;

        }
        .lower{
            
            height: 33%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .lowerbox{
            height: 90%;
            width: 20%;
            background-color: red;
        }
        .lowercircle{
            height: 90%;
            width: 20%;
            background-color: green;
            border-radius: 50%;
        }
        .mid{
            
            height: 33%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .midbox{
            height: 95%;
            width: 45%;
            background-color: cadetblue;
        }

        

    </style>
</head>
<body>
    <div class="container">
        <div class="upper">
            <div class="upperbox"></div>
        </div>
        <div class="mid">
            <div class="midbox"></div>
            <div class="midbox"></div>
        </div>
        <div class="lower">
            <div class="lowerbox"></div>
            <div class="lowercircle"></div>
            <div class="lowerbox"></div>
            <div class="lowercircle"></div>
        </div>
    </div>
</body>
</html>
