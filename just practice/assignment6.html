<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 90vh;
            width: 80vw;
            background-color: black;
            margin: auto;
        }
        .upper{
            
            height: 33%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .mid{
            
            height: 33%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .lower{
            
            height: 33%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .profile{
            height: 90%;
            background-color: blue;
            width: 17%;
            border-radius: 50%;
        }
        .summary{
            height: 90%;
            background-color: blue;
            width: 75%;
        }
        .midaside{
            height: 90%;
            width: 17%;
            background-color: grey;
        }
        .midbox{
            height: 90%;
            width: 75%;
            background-color: grey;
        }
        .box{
            height: 90%;
            width: 17%;
            background-color: purple;
        }
        .box2{
            height: 90%;
            width: 75%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .b1{
            background-color: rebeccapurple;
            height: 100%;
            width: 50%;

        }
        .b2{
            background-color: rebeccapurple;
            height: 100%;
            width: 50%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="upper">
            <div class="profile"></div>
            <div class="summary"></div>
        </div>
        <div class="mid">
            <div class="midaside"></div>
            <div class="midbox"></div>
        </div>
        <div class="lower">
            <div class="box"></div>

            <div class="box2">
                <div class="b1"></div>
                <div class="b2"></div>
            </div>
        </div>
        
    </div>
</body>
</html>
