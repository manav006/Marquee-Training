<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        nav{
            background-color: rgb(207, 215, 223);
            height: 10vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 300px;
        }
        .icons{
           
            height: 90%;
            width: 20%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }
        .location{
           
            height: 90%;
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .icons .box{
            height: 90%;
            width: 100px;
            background-color: aquamarine;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    .search{
            background-color: rgb(188, 205, 221);
            height: 10vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
    }
    .searchbox{
        border: 2px solid black;
        padding: 15px;
        width: 60%;
        border-radius: 5px;
    }
    .options{
        
        width: 30%;
        height: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 90px;
    }
    .items{
        background-color: rgb(156, 166, 175);
        height: 10vh;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 5px;
    }
    .item{
        border: 2px solid black;
        height: 80%;
        width: 6%;
    }
    .container{
        
        display: flex;
        justify-content: center;
        align-items: center;
        height: 50vh;
        width: 95vw;
        margin: auto;
        margin-top: 20px;
        gap: 30px;
    }
    .big{
        height: 100%;
        width: 78%;
        
        justify-content: center;
        align-items: center;
        display: flex;
        gap: 30px;
    }
    .bigboxes{
        height: 100%;
        width: 48%;
        background-color: purple;
    }
    .small{
        height: 100%;
        width: 18%;
        
        background-color: purple;
    }
    .hero{
        height: 60vh;
        background-color: yellow;
        margin: auto;
        margin-top: 40px;
        width: 93vw;
        border-radius: 5px;
        margin-bottom: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
    }
    .herobox{
        background-color: grey;
        height: 80%;
        width: 24%;
    }
    </style>
</head>
<body>
    <nav>
        <div class="icons">
            <div class="box">Flipkart</div>
            <div class="box">Travel</div>
        </div>
        <div class="location">vadodara gujarat</div>
    </nav>
    <div class="search">
        <div class="searchbox"></div>
        <div class="options">
            <div class="login">LOGIN</div>
            <div class="login">More</div>
            <div class="login">Cart</div>
        </div>
    </div>
    <div class="items">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>
    <div class="container">
        <div class="big">
            <div class="bigboxes"></div>
            <div class="bigboxes"></div>
        </div>
        <div class="small"></div>
    </div>

    <div class="hero">
        <div class="herobox"></div>
        <div class="herobox"></div>
        <div class="herobox"></div>
        <div class="herobox"></div>
    </div>
</body>
</html>
