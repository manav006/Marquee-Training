<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        width:70vw;
        height:70vh;
        border:1px solid black;
        margin:auto;
        display:grid;
        grid-template-columns:repeat(4,1fr);
        grid-template-rows:repeat(3,1fr);
        gap:10px;
    }
    .box1{
        background-color:blue;
        grid-column:1/3;
        grid-row:1/3;
    }
    .box2{
        background-color:red;
        grid-column:3/4;
        grid-row:1/2;
    }
    .box3{
        background-color:green;
        grid-column:4/5;
        grid-row:1/2;
    }
    .box4{
        background-color:yellow;
        grid-column:3/4;
        grid-row:2/3;
    }
    .box5{
        background-color:orange;
        grid-column:4/5;
        grid-row:2/3;
    }
    .box6{
        background-color:rgb(119, 77, 119);
        grid-column:1/5;
        grid-row:3/4;
    }
</style>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
        <div class="box6"></div>
    </div>
</body>
</html>
