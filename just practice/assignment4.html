<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 90vh;
            width: 80vw;
            background-color: black;
            margin: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            
        }
        .hero{
            
            height: 30%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }
        .bottom{
            border: 2px solid rgb(100, 52, 52);
            height: 50%;
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            background-color: rgb(79, 160, 160);
        }
        .gol{
            height: 100px;
            width: 100px;
            background-color: aqua;
            border-radius: 50px;
        }
        .info{
            height: 100px;
            width: 70%;
            background-color: white;
        }
        .box{
            background-color: white;
            height: 150px;
            width: 40%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="gol"></div>
            <div class="info"></div>
        </div>
        <div class="bottom">
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>
</body>
</html>
