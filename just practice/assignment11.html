<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: black;
            margin:auto;
            height:70vh;
            width:70vw;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 1fr 3fr 1fr;
            grid-template-areas: "header header header"
                                    "sidebar main aside"
                                    "footer footer footer";
            gap: 10px;

        }
        .box1{
            background-color: red;
            grid-area: header;
        }
        .box2{
            background-color: green;
            grid-area: sidebar;
        }
        .box3{
            background-color: blue;
            grid-area: main;
        }
        .box4{
            background-color: yellow;
            grid-area: aside;
        }
        .box5{
            background-color: purple;
            grid-area: footer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1" ></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
    </div>
</body>
</html>
