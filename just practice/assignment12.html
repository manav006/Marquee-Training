<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: black;
            margin:auto;
            height:70vh;
            width:70vw;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 2fr 1fr 1fr;
            grid-template-areas: "kashmir madhyapradesh"
                                 "rajasthan rajasthan"
                                 "Bihar uttarpradesh";
                                 
            gap: 10px;
            padding: 10px;
        }
        .box1{
            background-color: red;
            grid-area: kashmir;
        }
        .box2{
            background-color: green;
            grid-area: madhyapradesh;
        }
        .box3{
            background-color: blue;
            grid-area: rajasthan;
        }
        .box4{
            background-color: yellow;
            grid-area: Bihar;
        }
        .box5{
            background-color: purple;
            grid-area: uttarpradesh;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
    </div>
</body>
</html>
