<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .nav{
            height: 15vh;
            width: 100vw;
            background-color: black;
            position: fixed;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: fixed;
        }
        .circle{
            background-color: white;
            height: 70px;
            width: 70px;
            border-radius: 50px;
            background-image: url("download.jpg");
            background-size:contain;
        }
        .middle{
    
            width: 30%;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .right{
           
            height: 30px;
            width: 30%;
            
            display: flex;
            gap: 10px;
        }
        .box{
            border: 1px solid white;
            border-radius: 10px;
            height: 100%;
            width: 20%;
        }
        .search{
            height: 100%;
            width: 75%;
            border: 1px solid white;
            border-radius: 10px;
        }
        .container{
            height: 80vh;
            background-color: lightgray;
            display:flex;
            padding-top: 20vh;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            column-gap: 200px;
        }
        ul{
            text-decoration: none;
            list-style: none;
            display: flex;
            gap: 15px;
            color: white;
        }

        .boxi{
            height: 200px;
            width: 200px;
            background-color: rgb(100, 63, 63);
            border: 1px solid black;
            

        }
        .boxi:hover{
            grow: 2;
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="circle"></div>
        <div class="middle">
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Services</li>
                <li>Contact</li>
            </ul>
        </div>
        <div class="right">
            <div class="search"></div>
            <div class="box"></div>
        </div>
    </div>

    <div class="container">
        <div class="boxi"></div>
        <div class="boxi"></div>
        <div class="boxi"></div>
        <div class="boxi"></div>
        <div class="boxi"></div>
    </div>
</body>
</html>
