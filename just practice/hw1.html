<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
    body{
        display: flex;
    }
     .container{
        margin: auto;
        height: 40vw;
        width: 60vw;
        
    }
    .box{
        height:150px;
        width:150px;
        border: 2px solid black;
        
    }
    .b1{
        background-color: red;
        position: relative;
        z-index: 5;
    }
    .b2{
        background-color: green;
        position: relative;
        left: 35px;
        bottom: 110px;
        z-index: 4;
    }
    .b3{
        background-color: blue;
        position: relative;
        left: 70px;
        bottom: 220px;
        z-index: 3;
    }
    .b4{
        background-color: yellow;
        position: relative;
        left: 105px;
        bottom: 330px;
        z-index: 2;
    }
    .b5{
        background-color: cyan;
        position: relative;
        left: 140px;
        bottom: 440px;
        z-index: 1;
    }

    .br1{
        background-color: red;
        position: relative;
        z-index: 1;
    }
    .br2{
        background-color: green;
        position: relative;
        left: 35px;
        bottom: 110px;
        z-index: 2;
    }

    .br3{
        background-color: blue;
        position: relative;
        left: 70px;
        bottom: 220px;
        z-index: 3;
    }

    .br4{
        background-color: yellow;
        position: relative;
        left: 105px;
        bottom: 330px;
        z-index: 4;
    }

    .br5{
        background-color: cyan;
        position: relative;
        left: 140px;
        bottom: 440px;
        z-index: 5;
    }
   </style>
</head>
<body>
    <div class="container">
        <div class="box b1"></div>
        <div class="box b2"></div>
        <div class="box b3"></div>
        <div class="box b4"></div>
        <div class="box b5"></div>
    </div>

        <div class="container">
        <div class="box br1"></div>
        <div class="box br2"></div>
        <div class="box br3"></div>
        <div class="box br4"></div>
        <div class="box br5"></div>
    </div>
</body>
</html>
