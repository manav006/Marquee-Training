<!DOCTYPE html>
<html lang="en">
<head>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

.open-sans {
  font-family: "Open Sans", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-variation-settings: "wdth" 100;
}
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            background-color: black;
            font-family: 'Poppins', sans-serif;
        }
        *{
            margin: 0;
            padding: 0;
        }
        .container {
            height: 96vh;
            width: 70vw;
            margin: auto;
            background-color: black;
            display:grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
             background-color: rgb(46, 4, 46);
        }
        .box{
        
            border-radius: 10px;
            background-color: rgb(77, 4, 77);
        }

        .box1{
            grid-column: 1/2;
            grid-row: 1/2;
            
             background-size: cover;
             background-position: center;
        }

        .box2{
            grid-column: 2/3;
            grid-row: 1/2;
        }

        .box3{
            grid-column: 3/4;
            grid-row: 1/2;
        }

        .box4{
            grid-column: 1/2;
            grid-row: 2/3;
        }
        .box5{
            grid-column: 2/3;
            grid-row: 2/3;
            background-image: url("show5.jpg");
             background-size: cover;
             background-position: center;
        }
        .box6{
            grid-column: 3/4;
            grid-row: 2/4;
            background-color: white;
        }
        .box7{
            grid-column: 1/3;
            grid-row: 3/4;
        }

    </style>
</head>

<body>
    <div class="container">
        <div class="box box1">
            <img src="download.jpg" alt="" style="width: 100%; height: 100%; border-radius: 10px;">
        </div>
        <div class="box box2" style="display: flex; justify-content: center; align-items: center; flex-direction: column;">
            <p style="color: white; font-size: 70px; ">25K</p>
            <p style="color: white; font-size: 12px; ">Weekly Likes</p>
        </div>
        <div class="box box3" style="display: flex; justify-content: center; align-items: center; flex-direction: column;">
            <p style="color: white; font-size: 70px; ">50K</p>
            <p style="color: white; font-size: 12px; ">Weekly views</p>
        </div>
        <div class="box box4">
            <div style="display: flex; justify-content: space-around; width: 100%; height:30%; align-items: center;"><p style="color: white;">Active Users</p> <p style="color: rgb(81, 216, 81);">+154</p></div>
            <div style=" height: 70%; display: flex; justify-content: center; align-items: center;">
                <p style="color: white; font-size: 70px;">1,538</p>
            </div>
        </div>
        <div class="box box5"></div>
        <div class="box box6" style="display: flex; justify-content: flex-end; align-items: center; flex-direction: column;">
            <p style="color: black; font-size: 70px; ">200K</p>
            
        </div>
        <div class="box box7">
            <p style="color: white;padding: 20px; font-size: 16px; width: 40%; ">A place to learn UI Design & Web Design.</p>
        </div>
    </div>
</body>
</html>
